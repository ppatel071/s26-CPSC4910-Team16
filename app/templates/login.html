{% extends "base.html" %}

{% block title %}Log In{% endblock %}

{% block content %}
<div class="login">
    <h1 style="font-family: Arial, Helvetica, sans-serif; text-align: center;">Log In</h1>
    <form style="text-align: center;" action="/login", method="POST">
        Username:
        <input type="text" id="username" name="username" placeholder="e.g. user123"><br><br>
        Password: 
        <input type="password" name="password" placeholder="e.g. password123"><br><br>

        <input type="submit" value="Log In"><br>
        <button type="button" onclick="clearUsername()">Clear Username</button> 
    </form>
</div>
<p style="text-align: center;"><a class="button" href="{{ url_for('auth.register') }}">Need an account? Register</a></p>
<p style="text-align: center;"><a class="button" href="{{ url_for('auth.forgot_password') }}">Forgot password?</a></p>

<script>
    const userIn = document.getElementById("username");

    window.addEventListener("load", () => {
        const savedUsername = localStorage.getItem("savedUsername");
        if (savedUsername) {
            userIn.value = savedUsername;
        }
    });

    userIn.addEventListener("input", () => {
    if (userIn.value.trim() !== "") {
        localStorage.setItem("savedUsername", userIn.value);
    }
    });

    function clearUsername() {
        localStorage.removeItem("savedUsername");
        userIn.value = "";
        userIn.focus();
    }
</script>

{% endblock %}
