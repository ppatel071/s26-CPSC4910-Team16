{% extends "base.html" %}

{% block title %}Log In{% endblock %}

{% block content %}
<style>
    .login-page {
        max-width: 460px;
        margin: 40px auto;
        padding: 0 20px;
    }

    .login-card {
        color: black;
    }

    .login-title {
        text-align: center;
        margin-bottom: 8px;
    }

    .login-subtitle {
        text-align: center;
        color: #516173;
        margin-bottom: 24px;
    }

    .login-form {
        display: grid;
        gap: 16px;
    }

    .login-field label {
        display: block;
        font-weight: 600;
        margin-bottom: 6px;
    }

    .login-field input {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid #cfd7e3;
        border-radius: 8px;
        box-sizing: border-box;
        font-size: 1rem;
    }

    .login-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        justify-content: center;
        margin-top: 8px;
    }

    .login-submit {
        padding: 10px 18px;
        border: none;
        border-radius: 8px;
        background: #4a90e2;
        color: white;
        cursor: pointer;
        font-size: 1rem;
        font-family: inherit;
        font-size: inherit;
        font-weight: inherit;
    }

    .login-submit:hover {
        background: #357abd;
    }

    .login-links {
        display: grid;
        gap: 10px;
        justify-items: center;
        margin-top: 18px;
    }
</style>

<div class="login-page">
    <div class="section-card login-card">
        <div class="login-title">
            <h1>Log In</h1>
        </div>
        <form class="login-form" action="/login" method="POST">
            <div class="login-field">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="e.g. user123" autocomplete="username">
            </div>

            <div class="login-field">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" autocomplete="current-password">
            </div>

            <div class="login-actions">
                <input class="login-submit" type="submit" value="Log In">
                <button type="button" class="button" onclick="clearUsername()">Clear Username</button>
            </div>
        </form>
    </div>

    <div class="login-links">
        <a class="button" href="{{ url_for('auth.register') }}">Need an account? Register</a>
        <a class="button" href="{{ url_for('auth.forgot_password') }}">Forgot password?</a>
    </div>
</div>

<script>
    const userIn = document.getElementById("username");

    window.addEventListener("load", () => {
        const savedUsername = localStorage.getItem("savedUsername");
        if (savedUsername) {
            userIn.value = savedUsername;
        }
    });

    userIn.addEventListener("input", () => {
    if (userIn.value.trim() !== "") {
        localStorage.setItem("savedUsername", userIn.value);
    }
    });

    function clearUsername() {
        localStorage.removeItem("savedUsername");
        userIn.value = "";
        userIn.focus();
    }
</script>

{% endblock %}
