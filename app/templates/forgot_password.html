{% extends "base.html" %}

{% block title %}Forgot Password{% endblock %}

{% block content %}
<h1>Forgot Password</h1>

{% if not form_sent %}

<form action="/forgot_password", method="POST">
    Username or Email:<br>
    <input type="text" name="user_email" value="{{ user_email|default('') }}" required><br>

    <input id="submit" type="submit" value="Submit" >
</form>

{% else %}

<h3>An email has been sent to {{ user_email }}</h3>

<h4>{{url}}</h4>

{% endif %}

{% endblock %}
