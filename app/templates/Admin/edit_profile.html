{% extends "base.html" %}

{% block title %}Edit Admin Profile{% endblock %}

{% block content %}
<h1>Edit Admin Profile</h1>

{% if error %}
<p style="color: red;"><strong>{{ error }}</strong></p>
{% endif %}

<form method="POST" action="" onsubmit="return confirm('Are you sure you want to save these changes?');">
  <label for="username">Username</label><br>
  <input id="username" name="username" type="text" required value="{{ user.username }}"><br><br>

  <label for="email">Email</label><br>
  <input id="email" name="email" type="text" value="{{ user.email or '' }}"><br><br>

  <label for="first_name">First Name</label><br>
  <input id="first_name" name="first_name" type="text" required value="{{ user.first_name or '' }}"><br><br>

  <label for="last_name">Last Name</label><br>
  <input id="last_name" name="last_name" type="text" required value="{{ user.last_name or '' }}"><br><br>

  <button type="submit">Save Changes</button>
</form>

<p>
  <a class="button" href="{{ url_for('admin.profile') }}">Back to Profile</a>
</p>
{% endblock %}
