{% extends "base.html" %}

{% block title %}Add Admin User{% endblock %}

{% block content %}
<h1>Add Admin User</h1>
<p>
    <a class="button" href="{{ url_for('admin.dashboard') }}">Back to Dashboard</a>
</p>
<form method="post">
  <p>
    <label for="username">Username</label><br>
    <input id="username" name="username" type="text" value="{{ username or '' }}" required>
  </p>

  <p>
    <label for="email">Email</label><br>
    <input id="email" name="email" type="text" value="{{ email or '' }}" required>
  </p>

  <p>
    <label for="first_name">First Name</label><br>
    <input id="first_name" name="first_name" type="text" value="{{ first_name or '' }}" required>
  </p>

  <p>
    <label for="last_name">Last Name</label><br>
    <input id="last_name" name="last_name" type="text" value="{{ last_name or '' }}" required>
  </p>

  <p>
    <label for="password">Password</label><br>
    <input id="password" name="password" type="password" required>
  </p>

  <p>
    <label for="confpass">Confirm Password</label><br>
    <input id="confpass" name="confpass" type="password" required>
  </p>

  <p>
    <button class="button" type="submit">Create Admin</button>
    <a class="button" href="{{ url_for('admin.admin_logins') }}">Back to Admin List</a>
  </p>
</form>
{% endblock %}
