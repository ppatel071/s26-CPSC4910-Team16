{% extends "base.html" %}

{% block content %}

<h1>Driver Application Form</h1>
<hr>

<form method="POST" action="{{ url_for('driver.submit_application') }}">
    <p>
        <label>Sponsor Organization:</label><br>
        <select name="organization_id" required>
            <option value="">Select an organization</option>
            {% for org in available_organizations %}
                <option
                    value="{{ org.organization_id }}"
                    {% if selected_organization_id == org.organization_id %}selected{% endif %}
                >
                    {{ org.name }}
                </option>
            {% endfor %}
        </select>
    </p>

    <p>
        <label>Full Name:</label><br>
        <input type="text" name="full_name" required>
    </p>

    <p>
        <label>Phone Number:</label><br>
        <input type="text" name="phone_number" required>
    </p>

    <p>
        <label>Address:</label><br>
        <input type="text" name="address" required>
    </p>

    <p>
        <label>Driving Experience:</label><br>
        <textarea name="experience" rows="4" required></textarea>
    </p>

    <button type="submit">Submit Application</button>

</form>

{% if not available_organizations %}
    <p>No sponsor organizations are currently available for application.</p>
{% endif %}

{% endblock %}
